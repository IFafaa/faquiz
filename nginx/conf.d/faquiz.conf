upstream faquiz_web {
  server web:80;
}

upstream faquiz_api {
  server api:3333;
}

server {
  listen 80;
  listen [::]:80;

  server_name faquiz.com.br www.faquiz.com.br;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name faquiz.com.br www.faquiz.com.br;

  ssl_certificate     /etc/letsencrypt/live/faquiz.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/faquiz.com.br/privkey.pem;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location ^~ /api {
    proxy_pass http://faquiz_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://faquiz_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

