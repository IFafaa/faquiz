services:
  cert-init:
    image: alpine:3.20
    environment:
      CERTBOT_DOMAINS: ${CERTBOT_DOMAINS:-faquiz.com.br,www.faquiz.com.br}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./scripts/init-self-signed-cert.sh:/init-self-signed-cert.sh:ro
    entrypoint: ["/bin/sh", "/init-self-signed-cert.sh"]
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - cert-init
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
      CERTBOT_DOMAINS: ${CERTBOT_DOMAINS:-faquiz.com.br,www.faquiz.com.br}
      NGINX_CONTAINER_NAME: ${NGINX_CONTAINER_NAME:-faquiz-nginx-1}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/certbot-entrypoint.sh:/certbot-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/certbot-entrypoint.sh"]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faquiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faquiz}
      POSTGRES_DB: ${POSTGRES_DB:-faquiz}
    volumes:
      - faquiz-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faquiz} -d ${POSTGRES_DB:-faquiz}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./faquiz-api
      dockerfile: Dockerfile
    expose:
      - "3333"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-faquiz}:${POSTGRES_PASSWORD:-faquiz}@db:5432/${POSTGRES_DB:-faquiz}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      PORT: "3333"
      MAIL_ENABLED: ${MAIL_ENABLED:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    restart: unless-stopped

  web:
    build:
      context: ./faquiz-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  faquiz-pgdata:
  letsencrypt:
  certbot-webroot:
